<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaDownloader - Working Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap');

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .content {
            padding: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .url-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        input[type="text"], input[type="url"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="url"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            min-width: 140px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem 1rem;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: #666;
            font-size: 0.95rem;
        }

        .result-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .media-preview {
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            background: #f5f5f5;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-preview img,
        .media-preview video {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }

        .download-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .download-btn:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .error-box {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .error-box.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-box strong {
            display: block;
            margin-bottom: 0.5rem;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #004085;
            line-height: 1.6;
        }

        .info-box strong {
            color: #003366;
        }

        .api-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: center;
        }

        .carousel {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 1rem;
            padding: 5px 0;
        }

        .carousel img, .carousel video {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .carousel img:hover, .carousel video:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .url-input-wrapper {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>InstaDownloader</h1>
        <p>Download Instagram photos & videos instantly</p>
    </header>

    <div class="content">
        <div class="error-box" id="errorBox"></div>

        <div class="input-group">
            <div class="url-input-wrapper">
                <input 
                    type="url" 
                    id="instaUrl" 
                    placeholder="https://www.instagram.com/p/..." 
                    autocomplete="off"
                />
                <button id="downloadBtn">Download</button>
            </div>
            <div class="api-status">Using free Instagram API</div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div class="loader-text" id="loaderText">Fetching your content...</div>
        </div>

        <div class="result-section" id="resultSection">
            <div id="carousel" class="carousel"></div>
            <div class="media-preview" id="mediaContainer"></div>
            <div class="download-options" id="downloadOptions"></div>
        </div>

        <div class="info-box">
            <strong>💡 How it works:</strong> Paste a public Instagram post/reel URL (instagram.com/p/XXX or instagram.com/reel/XXX) and we'll download it for you.
        </div>
    </div>
</div>

<script>
    const downloadBtn = document.getElementById('downloadBtn');
    const instaUrl = document.getElementById('instaUrl');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    const resultSection = document.getElementById('resultSection');
    const mediaContainer = document.getElementById('mediaContainer');
    const downloadOptions = document.getElementById('downloadOptions');
    const errorBox = document.getElementById('errorBox');
    const carousel = document.getElementById('carousel');

    function showError(message) {
        errorBox.innerHTML = `<strong>⚠️ Error:</strong> ${message}`;
        errorBox.classList.add('active');
        loader.classList.remove('active');
        resultSection.classList.remove('active');
        downloadBtn.disabled = false;
    }

    function hideError() {
        errorBox.classList.remove('active');
    }

    function updateLoaderText(text) {
        loaderText.textContent = text;
    }

    downloadBtn.addEventListener('click', async () => {
        const url = instaUrl.value.trim();
        
        if (!url) {
            showError('Please enter an Instagram URL');
            return;
        }

        hideError();
        loader.classList.add('active');
        resultSection.classList.remove('active');
        downloadBtn.disabled = true;

        try {
            // Validate URL
            if (!url.includes('instagram.com')) {
                throw new Error('Please enter a valid Instagram URL');
            }

            updateLoaderText('Connecting to Instagram...');

            // Method 1: Using InstaSave API (works well for public posts)
            let mediaData = null;

            try {
                updateLoaderText('Trying Method 1: InstaSave API...');
                const response = await fetch('https://instasave.io/api/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                if (response.ok) {
                    mediaData = await response.json();
                    console.log('Method 1 success:', mediaData);
                }
            } catch (e) {
                console.log('Method 1 failed:', e.message);
            }

            // Method 2: Using nInstastories API
            if (!mediaData) {
                try {
                    updateLoaderText('Trying Method 2: NInstastories API...');
                    const encodedUrl = encodeURIComponent(url);
                    const response = await fetch(`https://ninstastories.com/api/download?link=${encodedUrl}`);

                    if (response.ok) {
                        mediaData = await response.json();
                        console.log('Method 2 success:', mediaData);
                    }
                } catch (e) {
                    console.log('Method 2 failed:', e.message);
                }
            }

            // Method 3: Using ig.media API
            if (!mediaData) {
                try {
                    updateLoaderText('Trying Method 3: IG.Media API...');
                    const response = await fetch('https://ig.media/api/v1/media', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ url: url })
                    });

                    if (response.ok) {
                        mediaData = await response.json();
                        console.log('Method 3 success:', mediaData);
                    }
                } catch (e) {
                    console.log('Method 3 failed:', e.message);
                }
            }

            // Method 4: Using imgdownloader API
            if (!mediaData) {
                try {
                    updateLoaderText('Trying Method 4: ImgDownloader API...');
                    const encodedUrl = encodeURIComponent(url);
                    const response = await fetch(`https://i.instagram.com/api/v1/media/info/?url=${encodedUrl}`, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X)'
                        }
                    });

                    if (response.ok) {
                        mediaData = await response.json();
                        console.log('Method 4 success:', mediaData);
                    }
                } catch (e) {
                    console.log('Method 4 failed:', e.message);
                }
            }

            if (!mediaData || (!mediaData.data && !mediaData.media && !mediaData.url)) {
                throw new Error('No API responded successfully. Make sure: 1) Post is PUBLIC, 2) URL is correct (instagram.com/p/XXX), 3) Try a different post');
            }

            // Extract media URLs from different API response formats
            let mediaItems = [];
            
            if (mediaData.data) {
                if (Array.isArray(mediaData.data)) {
                    mediaItems = mediaData.data;
                } else if (mediaData.data.url) {
                    mediaItems = [mediaData.data];
                }
            } else if (mediaData.media) {
                mediaItems = Array.isArray(mediaData.media) ? mediaData.media : [mediaData.media];
            } else if (mediaData.url) {
                mediaItems = [{ url: mediaData.url, type: mediaData.type }];
            }

            if (mediaItems.length === 0) {
                throw new Error('Could not extract media from API response');
            }

            updateLoaderText('Loading preview...');

            // Display first media item
            const firstItem = mediaItems[0];
            const mediaUrl = firstItem.url || firstItem.download_url || firstItem.media_url || firstItem;
            const isVideo = firstItem.type === 'video' || mediaUrl.includes('.mp4') || mediaUrl.includes('video');

            if (isVideo) {
                mediaContainer.innerHTML = `<video controls style="width: 100%; height: auto; max-height: 400px;"><source src="${mediaUrl}" type="video/mp4"></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${mediaUrl}" alt="Instagram media" style="width: 100%; height: auto; max-height: 400px; object-fit: contain;">`;
            }

            // Show carousel for multiple items
            if (mediaItems.length > 1) {
                carousel.innerHTML = '';
                mediaItems.forEach((item, idx) => {
                    const itemUrl = item.url || item.download_url || item.media_url || item;
                    const isItemVideo = item.type === 'video' || itemUrl.includes('.mp4');
                    const element = isItemVideo ? 
                        `<video style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; cursor: pointer;" data-index="${idx}"></video>` :
                        `<img src="${itemUrl}" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; cursor: pointer;" data-index="${idx}" />`;
                    const carouselItem = document.createElement('div');
                    carouselItem.innerHTML = element;
                    carouselItem.querySelector('img, video').addEventListener('click', () => {
                        const newItem = mediaItems[idx];
                        const newUrl = newItem.url || newItem.download_url || newItem.media_url || newItem;
                        const newIsVideo = newItem.type === 'video' || newUrl.includes('.mp4');
                        if (newIsVideo) {
                            mediaContainer.innerHTML = `<video controls style="width: 100%; height: auto; max-height: 400px;"><source src="${newUrl}" type="video/mp4"></video>`;
                        } else {
                            mediaContainer.innerHTML = `<img src="${newUrl}" alt="Instagram media" style="width: 100%; height: auto; max-height: 400px; object-fit: contain;">`;
                        }
                    });
                    carousel.appendChild(carouselItem);
                }
                );
            }

            // Create download button
            const fileName = `instagram_${Date.now()}${isVideo ? '.mp4' : '.jpg'}`;
            downloadOptions.innerHTML = `
                <a href="${mediaUrl}" download="${fileName}" class="download-btn">
                    <span>⬇️</span> Download Media
                </a>
                <button class="download-btn" style="background: #6c757d;" onclick="copyToClipboard('${mediaUrl.replace(/'/g, "\\'")}')">
                    <span>📋</span> Copy Media Link
                </button>
            `;

            resultSection.classList.add('active');
            updateLoaderText('Done!');

        } catch (err) {
            showError(err.message);
            console.error('Full error:', err);
        } finally {
            loader.classList.remove('active');
            downloadBtn.disabled = false;
        }
    });

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Media URL copied to clipboard!');
        }).catch(err => {
            alert('Failed to copy: ' + err);
        });
    }

    // Allow Enter key to trigger download
    instaUrl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            downloadBtn.click();
        }
    });
</script>

</body>
</html>
