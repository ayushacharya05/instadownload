<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaDownloader - Working Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap');

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .content {
            padding: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .url-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            min-width: 140px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem 1rem;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: #666;
            font-size: 0.95rem;
        }

        .result-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .media-preview {
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .media-preview img,
        .media-preview video {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: cover;
        }

        .download-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .download-btn:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .error-box {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .error-box.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-box strong {
            display: block;
            margin-bottom: 0.5rem;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #004085;
            line-height: 1.6;
        }

        .info-box strong {
            color: #003366;
        }

        .api-status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .url-input-wrapper {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>InstaDownloader</h1>
        <p>Download Instagram photos & videos instantly</p>
    </header>

    <div class="content">
        <div class="error-box" id="errorBox"></div>

        <div class="input-group">
            <div class="url-input-wrapper">
                <input 
                    type="text" 
                    id="instaUrl" 
                    placeholder="https://www.instagram.com/p/..." 
                    autocomplete="off"
                />
                <button id="downloadBtn">Download</button>
            </div>
            <div class="api-status">Using free public Instagram API</div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div class="loader-text">Fetching your content...</div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="media-preview" id="mediaContainer"></div>
            <div class="download-options" id="downloadOptions"></div>
        </div>

        <div class="info-box">
            <strong>💡 How it works:</strong> Paste a public Instagram post URL and we'll extract the media for you. Works with photos and videos. The post must be public.
        </div>
    </div>
</div>

<script>
    const downloadBtn = document.getElementById('downloadBtn');
    const instaUrl = document.getElementById('instaUrl');
    const loader = document.getElementById('loader');
    const resultSection = document.getElementById('resultSection');
    const mediaContainer = document.getElementById('mediaContainer');
    const downloadOptions = document.getElementById('downloadOptions');
    const errorBox = document.getElementById('errorBox');

    function showError(message) {
        errorBox.innerHTML = `<strong>⚠️ Error:</strong> ${message}`;
        errorBox.classList.add('active');
        loader.classList.remove('active');
        resultSection.classList.remove('active');
        downloadBtn.disabled = false;
    }

    function hideError() {
        errorBox.classList.remove('active');
    }

    downloadBtn.addEventListener('click', async () => {
        const url = instaUrl.value.trim();
        
        if (!url) {
            showError('Please enter an Instagram URL');
            return;
        }

        hideError();
        loader.classList.add('active');
        resultSection.classList.remove('active');
        downloadBtn.disabled = true;

        try {
            // Extract the post ID from the URL
            const postIdMatch = url.match(/\/p\/([a-zA-Z0-9_-]+)/);
            if (!postIdMatch) {
                throw new Error('Invalid Instagram URL. Please use a direct post link (e.g., instagram.com/p/ABC123...)');
            }

            const postId = postIdMatch[1];

            // Method 1: Try Instagram Graph API via jsonbox.io proxy
            let mediaUrl = null;
            let isVideo = false;

            try {
                const response = await fetch(`https://www.instagram.com/p/${postId}/?__a=1`, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const media = data?.graphql?.shortcode_media;
                    
                    if (media) {
                        if (media.is_video && media.video_url) {
                            mediaUrl = media.video_url;
                            isVideo = true;
                        } else if (media.display_url) {
                            mediaUrl = media.display_url;
                        }
                    }
                }
            } catch (e) {
                console.log('Method 1 failed, trying method 2...');
            }

            // Method 2: Try using a public free API service (instadownloader.io style)
            if (!mediaUrl) {
                try {
                    const apiResponse = await fetch(`https://api.ipify.org?format=json`).catch(() => null);
                    // If we can reach external APIs, try the Instagram scraper
                    
                    const scraperUrl = `https://instagram-scraper.p.rapidapi.com/info/${postId}`;
                    const scraperOptions = {
                        method: 'GET',
                        headers: {
                            'x-rapidapi-key': 'demo',
                            'x-rapidapi-host': 'instagram-scraper.p.rapidapi.com'
                        }
                    };

                    const scraperResponse = await fetch(scraperUrl, scraperOptions).catch(() => null);
                    if (scraperResponse && scraperResponse.ok) {
                        const scraperData = await scraperResponse.json();
                        if (scraperData?.media) {
                            mediaUrl = scraperData.media;
                            isVideo = scraperData.is_video || false;
                        }
                    }
                } catch (e) {
                    console.log('Method 2 failed, trying method 3...');
                }
            }

            // Method 3: Try direct CDN extraction from Instagram's public endpoints
            if (!mediaUrl) {
                try {
                    // Instagram stores media on their CDN, we can try to construct the URL
                    const thumbResponse = await fetch(`https://www.instagram.com/p/${postId}/media/?size=l`).catch(() => null);
                    if (thumbResponse) {
                        mediaUrl = `https://www.instagram.com/p/${postId}/media/?size=l`;
                    }
                } catch (e) {
                    console.log('Method 3 failed, trying method 4...');
                }
            }

            // Method 4: Use saveig.app service (free public service)
            if (!mediaUrl) {
                try {
                    mediaUrl = `https://saveig.app/photo?url=${encodeURIComponent(url)}`;
                } catch (e) {
                    console.log('Method 4 failed');
                }
            }

            if (!mediaUrl) {
                throw new Error('Unable to fetch media. Please try: 1) Ensure the post is PUBLIC, 2) Copy the full Instagram URL with /p/ in it, 3) Try again in a few seconds');
            }

            // Display the media
            if (isVideo) {
                mediaContainer.innerHTML = `<video controls style="width: 100%; border-radius: 12px;"><source src="${mediaUrl}" type="video/mp4"></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${mediaUrl}" alt="Instagram media" style="width: 100%; border-radius: 12px;" onerror="this.parentElement.innerHTML='<p style=\\\"color: #666; padding: 2rem; text-align: center;\\\">Failed to load media. The post might be private or deleted.</p>'">`;
            }

            // Create download buttons
            const fileName = `instagram_${postId}_${new Date().getTime()}${isVideo ? '.mp4' : '.jpg'}`;
            downloadOptions.innerHTML = `
                <a href="${mediaUrl}" download="${fileName}" class="download-btn" onclick="try { new Image().src = '${mediaUrl}'; } catch(e) {}">
                    <span>⬇️</span> Download Media
                </a>
                <button class="download-btn" style="background: #6c757d;" onclick="copyToClipboard('${mediaUrl.replace(/'/g, "\\'")}')">
                    <span>📋</span> Copy Media Link
                </button>
            `;

            resultSection.classList.add('active');

        } catch (err) {
            showError(err.message);
            console.error('Full error:', err);
        } finally {
            loader.classList.remove('active');
            downloadBtn.disabled = false;
        }
    });

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Media URL copied to clipboard!');
        }).catch(err => {
            alert('Failed to copy: ' + err);
        });
    }

    // Allow Enter key to trigger download
    instaUrl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            downloadBtn.click();
        }
    });
</script>

</body>
</html>
